<div>
    <div>
<h1>Add Student
</h1>

</div>

<div>
    <form #studentForm=ngForm (ngSubmit) = "addStudent()">
        <div>
            <label >StudentId</label>
            <input class="form-control" type="number" name="sid" [(ngModel)]="student.id" #sid="ngModel" required min="1">

            <div *ngIf="sid.invalid && sid.touched">
                <small class="text-danger" *ngIf="sid.errors?.['required']">Sid is required</small>
                <small class="text-danger" *ngIf="sid.errors?.['min']">sid must be more than 0</small>

            </div>
        </div>
        <div>
        <label >Student Name</label>
        <input class="form-control" type="text" name="student.sname" [(ngModel)]="student.sname" #sname="ngModel" required minlength="3">
        <div *ngIf="sname.invalid && sname.touched">
            <small class="text-danger" *ngIf="sname.errors?.['required']">Sname is required</small>
            <small class="text-danger" *ngIf="sname.errors?.['minlength']">Student name should contain</small>
        </div>
        </div>


        <div>
        <label >Student Course</label>
        <input class="form-control" type="text" name="student.course" [(ngModel)]="student.course" #course="ngModel" required minlength="3" >
        <div *ngIf="course.invalid && course.touched">
            <small class="text-danger" *ngIf="course.errors?.['required']">Course is required</small>
            <small class="text-danger" *ngIf="course.errors?.['minlength']">Course name should contain 3 characters</small>
        </div>
        </div>
        <button type="submit" class="btn btn-success" [disabled]="studentForm.invalid">Add Student</button>

    </form>

    
</div>
</div>
